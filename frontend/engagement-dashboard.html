<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism AI - Engagement Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .summary-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .summary-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .summary-card h3 {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            opacity: 0.7;
        }
        
        .summary-card .number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .summary-card .detail {
            font-size: 0.9em;
            color: #999;
        }
        
        .content-table {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow-x: auto;
        }
        
        .content-table h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
        }
        
        th {
            padding: 15px;
            text-align: left;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }
        
        tbody tr {
            transition: background-color 0.2s ease;
        }
        
        tbody tr:hover {
            background-color: #f8f9fa;
        }
        
        .topic-cell {
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }
        
        .metric {
            text-align: center;
            font-weight: 600;
            color: #333;
        }
        
        .metric.views {
            color: #667eea;
        }
        
        .metric.engagement {
            color: #f093fb;
        }
        
        .metric.interactions {
            color: #4facfe;
        }
        
        .engagement-bar {
            display: inline-block;
            height: 6px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        .insights {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }
        
        .insights h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .insight-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .insight-item .emoji {
            font-size: 1.5em;
            margin-right: 15px;
        }
        
        .insight-item .text {
            color: #555;
            font-size: 0.95em;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }
        
        .error {
            background: white;
            border-radius: 10px;
            padding: 20px;
            color: #d32f2f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: white;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }
            
            .summary-grid {
                grid-template-columns: 1fr;
            }
            
            table {
                font-size: 0.9em;
            }
            
            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Engagement Dashboard</h1>
            <p>Track performance of published content across all channels</p>
        </header>
        
        <div id="content">
            <div class="loading">Loading engagement data...</div>
        </div>
    </div>
    
    <script>
        async function loadEngagementData() {
            try {
                const response = await fetch('/api/v1/engagement/report?days=30');
                if (!response.ok) throw new Error('Failed to load engagement data');
                
                const data = await response.json();
                displayDashboard(data);
            } catch (error) {
                document.getElementById('content').innerHTML = `<div class="error">Error loading data: ${error.message}</div>`;
            }
        }
        
        function displayDashboard(data) {
            const { summary, content } = data;
            
            let html = `
                <div class="summary-grid">
                    <div class="summary-card">
                        <h3>📝 Total Content</h3>
                        <div class="number">${summary.total_content_pieces}</div>
                        <div class="detail">pieces published</div>
                    </div>
                    
                    <div class="summary-card">
                        <h3>👁️ Total Views</h3>
                        <div class="number">${summary.total_views.toLocaleString()}</div>
                        <div class="detail">across all content</div>
                    </div>
                    
                    <div class="summary-card">
                        <h3>💬 Total Interactions</h3>
                        <div class="number">${summary.total_interactions}</div>
                        <div class="detail">reactions, comments, shares</div>
                    </div>
                    
                    <div class="summary-card">
                        <h3>📈 Avg Engagement</h3>
                        <div class="number">${summary.average_engagement_rate.toFixed(1)}%</div>
                        <div class="detail">engagement rate</div>
                    </div>
                </div>
                
                <div class="content-table">
                    <h2>📋 Content Performance</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Topic</th>
                                <th style="text-align: center;">Views</th>
                                <th style="text-align: center;">👍 Likes</th>
                                <th style="text-align: center;">💬 Comments</th>
                                <th style="text-align: center;">🔄 Shares</th>
                                <th style="text-align: center;">Interactions</th>
                                <th style="text-align: center;">Engagement %</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            content.forEach(item => {
                const engagementPct = (item.engagement_rate * 100).toFixed(1);
                html += `
                    <tr>
                        <td class="topic-cell" title="${item.topic}">${item.topic}</td>
                        <td class="metric views">${item.views}</td>
                        <td class="metric">${item.reactions}</td>
                        <td class="metric">${item.comments}</td>
                        <td class="metric">${item.shares}</td>
                        <td class="metric interactions">${item.total_interactions}</td>
                        <td class="metric engagement">${engagementPct}%<div class="engagement-bar" style="width: ${Math.min(engagementPct * 5, 100)}px;"></div></td>
                    </tr>
                `;
            });
            
            html += `
                        </tbody>
                    </table>
                    
                    <div class="insights">
                        <h3>📊 Key Insights</h3>
            `;
            
            // Generate insights
            if (content.length > 0) {
                const topContent = content[0];
                
                if (topContent.total_interactions > 0) {
                    html += `
                        <div class="insight-item">
                            <div class="emoji">🏆</div>
                            <div class="text">Top performer: <strong>"${topContent.topic}"</strong> with ${topContent.total_interactions} interactions</div>
                        </div>
                    `;
                }
                
                const totalInteractions = summary.total_interactions;
                if (totalInteractions > 100) {
                    html += `
                        <div class="insight-item">
                            <div class="emoji">🚀</div>
                            <div class="text">Strong engagement! ${totalInteractions} total interactions across ${summary.total_content_pieces} pieces</div>
                        </div>
                    `;
                }
                
                const mostCommented = content.reduce((a, b) => a.comments > b.comments ? a : b);
                if (mostCommented.comments > 0) {
                    html += `
                        <div class="insight-item">
                            <div class="emoji">💬</div>
                            <div class="text">Strong discussion: <strong>"${mostCommented.topic}"</strong> has ${mostCommented.comments} comments</div>
                        </div>
                    `;
                }
                
                const avgViews = summary.total_views / summary.total_content_pieces;
                html += `
                    <div class="insight-item">
                        <div class="emoji">👁️</div>
                        <div class="text">Average ${avgViews.toFixed(0)} views per piece (${summary.total_views} total)</div>
                    </div>
                `;
            } else {
                html += `
                    <div class="insight-item">
                        <div class="emoji">📝</div>
                        <div class="text">No content published yet. Start publishing to see engagement metrics!</div>
                    </div>
                `;
            }
            
            html += `
                    </div>
                </div>
            `;
            
            document.getElementById('content').innerHTML = html;
        }
        
        // Load data on page load and refresh every 30 seconds
        loadEngagementData();
        setInterval(loadEngagementData, 30000);
    </script>
</body>
</html>
